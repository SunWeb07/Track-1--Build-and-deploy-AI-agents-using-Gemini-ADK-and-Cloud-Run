<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept Simplifier Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            padding: 2rem;
        }
        h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .input-group {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        input {
            flex: 1;
            padding: 0.85rem 1.2rem;
            border: 1px solid #334155;
            border-radius: 12px;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #60a5fa; }
        input::placeholder { color: #64748b; }
        button {
            padding: 0.85rem 1.8rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 1.5rem;
            display: none;
        }
        .result-card.visible { display: block; }
        .result-card h2 {
            font-size: 1rem;
            color: #60a5fa;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .explanation {
            line-height: 1.7;
            color: #cbd5e1;
            margin-bottom: 1.5rem;
        }
        .diagram-box {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 1.2rem;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.9rem;
            color: #a78bfa;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .spinner {
            display: none;
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }
        .spinner.visible { display: block; }
        .spinner::after {
            content: '';
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid #334155;
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 0.75rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error {
            background: #371520;
            border: 1px solid #7f1d1d;
            border-radius: 12px;
            padding: 1rem;
            color: #fca5a5;
            display: none;
            text-align: center;
        }
        .error.visible { display: block; }
        .examples {
            text-align: center;
            margin-bottom: 1rem;
            color: #64748b;
            font-size: 0.85rem;
        }
        .examples span {
            cursor: pointer;
            color: #60a5fa;
            margin: 0 0.3rem;
            transition: color 0.2s;
        }
        .examples span:hover { color: #93c5fd; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Concept Simplifier</h1>
        <p class="subtitle">Enter any concept and get a simple explanation with a diagram</p>

        <div class="examples">
            Try: <span onclick="tryExample(this)">Recursion</span> |
            <span onclick="tryExample(this)">Machine Learning</span> |
            <span onclick="tryExample(this)">Blockchain</span> |
            <span onclick="tryExample(this)">API</span>
        </div>

        <div class="input-group">
            <input type="text" id="concept" placeholder="Enter a concept (e.g. What is AI?)" />
            <button id="btn" onclick="explain()">Explain</button>
        </div>

        <div class="spinner" id="spinner">Thinking with Gemini...</div>
        <div class="error" id="error"></div>

        <div class="result-card" id="result">
            <h2>💡 Simple Explanation</h2>
            <div class="explanation" id="explanation"></div>
            <h2>� External Data Used</h2>
            <div class="diagram-box" id="external" style="color: #60a5fa;"></div>
            <h2>�📊 Diagram</h2>
            <div class="diagram-box" id="diagram"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://concept-agent-454744404543.us-central1.run.app';
        const input = document.getElementById('concept');
        const btn = document.getElementById('btn');
        const spinner = document.getElementById('spinner');
        const error = document.getElementById('error');
        const result = document.getElementById('result');
        const explanation = document.getElementById('explanation');
        const externalEl = document.getElementById('external');
        const diagram = document.getElementById('diagram');

        input.addEventListener('keydown', e => { if (e.key === 'Enter') explain(); });

        function tryExample(el) {
            input.value = el.textContent;
            explain();
        }

        async function explain() {
            const text = input.value.trim();
            if (!text) return input.focus();

            btn.disabled = true;
            spinner.classList.add('visible');
            result.classList.remove('visible');
            error.classList.remove('visible');

            try {
                const res = await fetch(`${API_URL}/explain`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                if (!res.ok) throw new Error(`Server error: ${res.status}`);
                const data = await res.json();

                if (data.simple_explanation) {
                    explanation.textContent = data.simple_explanation;
                    externalEl.textContent = data.external_data_used || 'No external data';
                    diagram.textContent = data.diagram || 'No diagram available';
                } else if (data.result) {
                    explanation.textContent = data.result;
                    externalEl.textContent = '';
                    diagram.textContent = '';
                }
                result.classList.add('visible');
            } catch (err) {
                error.textContent = `Error: ${err.message}`;
                error.classList.add('visible');
            } finally {
                btn.disabled = false;
                spinner.classList.remove('visible');
            }
        }
    </script>
</body>
</html>
